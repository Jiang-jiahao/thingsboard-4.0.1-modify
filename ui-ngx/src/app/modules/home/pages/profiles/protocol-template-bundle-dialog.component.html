<h2 mat-dialog-title>{{ (isNew ? 'profiles.protocol-templates-dialog-add-title' : 'profiles.protocol-templates-dialog-edit-title') | translate }}</h2>

<div mat-dialog-content class="protocol-template-bundle-dialog-content flex flex-col gap-3">
  <mat-form-field class="mat-block w-full" subscriptSizing="dynamic" [formGroup]="bundleMetaForm">
    <mat-label translate>profiles.protocol-templates-bundle-display-name</mat-label>
    <input matInput formControlName="name" autocomplete="off">
    <mat-hint translate>profiles.protocol-templates-bundle-name-hint</mat-hint>
  </mat-form-field>

  <mat-tab-group mat-stretch-tabs="false" animationDuration="0ms" class="protocol-template-bundle-tabs">
    <mat-tab [label]="'profiles.protocol-templates-tab-templates' | translate">
      <div class="tab-scroll">
        <tb-protocol-template-bundle-editor
          [layoutMode]="'templatesOnly'"
          [protocolTemplateFormGroup]="bundleContentForm"
          [disabled]="false">
        </tb-protocol-template-bundle-editor>
      </div>
    </mat-tab>
    <mat-tab [label]="'profiles.protocol-templates-tab-commands' | translate">
      <div class="tab-scroll">
        <tb-protocol-template-bundle-editor
          [layoutMode]="'commandsOnly'"
          [protocolTemplateFormGroup]="bundleContentForm"
          [disabled]="false">
        </tb-protocol-template-bundle-editor>
      </div>
    </mat-tab>
  </mat-tab-group>
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="applyHuanuoJ3000Preset()">
    {{ 'profiles.protocol-templates-preset-huanuo-j3000' | translate }}
  </button>
  <button mat-button type="button" (click)="cancel()">{{ 'action.cancel' | translate }}</button>
  <button mat-raised-button color="primary" type="button" (click)="save()">{{ 'action.save' | translate }}</button>
</div>
